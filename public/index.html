<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeAlpha Shop</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

<div class="logo">

🛒 CodeAlpha Shop

</div>

<div class="search">

<input
type="text"
id="searchBox"
placeholder="🔍 Search Products..."
onkeyup="searchProducts()">

</div>

<div class="nav-links" id="navbarLinks">

<a href="index.html">Home</a>

<a href="cart.html">Cart</a>

<a href="login.html">Login</a>

<a href="register.html">Register</a>

</div>

</nav>

<!-- ================= HERO ================= -->

<section class="hero">

<div class="hero-left">

<h1>

Mega Sale is Live 🎉

</h1>

<p>

Discover amazing products at unbeatable prices.

</p>

<a href="#products">

<button>

Shop Now

</button>

</a>

</div>

<div class="hero-right">

<img
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600"
alt="Shopping">

</div>

</section>

<!-- ================= CATEGORY FILTER ================= -->

<div class="categories">

<button onclick="filterCategory('All')">

All

</button>

<button onclick="filterCategory('Shoes')">

Shoes

</button>

<button onclick="filterCategory('Mobiles')">

Mobiles

</button>

<button onclick="filterCategory('Laptop')">

Laptop

</button>

<button onclick="filterCategory('Electronics')">

Electronics

</button>

<button onclick="filterCategory('Watch')">

Watch

</button>

</div>

<!-- ================= PRODUCTS ================= -->

<section id="products" class="products">

<h2>

Featured Products

</h2>

<div class="product-grid" id="productGrid">

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

Developed by <b>Faraz © 2026</b>

</footer>

<script src="home.js"></script>

<script src="navbar.js"></script>

</body>

</html>
